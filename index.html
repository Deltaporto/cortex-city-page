<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Córtex City — acesso restrito</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--night:#090C18;--impulse:#5EE6FF;--myelin:#ECE9F4;--muted:#8E92B4;--faint:#5B5F84;--line:rgba(236,233,244,.12)}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;
    background:radial-gradient(130% 90% at 50% -10%,rgba(94,230,255,.07),transparent 55%),var(--night);
    color:var(--myelin);font-family:'Space Mono',monospace;padding:24px}
  .gate{width:100%;max-width:420px;text-align:center}
  .mark{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);margin-bottom:26px}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:44px;line-height:.95;letter-spacing:-.03em;margin:0 0 6px}
  h1 .l2{color:transparent;-webkit-text-stroke:1.1px var(--impulse)}
  .desc{font-size:12.5px;color:var(--muted);line-height:1.6;margin:18px auto 30px;max-width:34ch;letter-spacing:.01em}
  form{display:flex;flex-direction:column;gap:12px}
  input{font-family:'Space Mono',monospace;font-size:15px;text-align:center;letter-spacing:.05em;
    background:rgba(255,255,255,.03);border:1px solid var(--line);color:var(--myelin);
    border-radius:10px;padding:15px 16px;outline:none;transition:border-color .2s}
  input:focus{border-color:var(--impulse)}
  button{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    background:var(--impulse);color:#05060E;border:none;border-radius:10px;padding:15px;cursor:pointer;font-weight:700;transition:opacity .2s}
  button:hover{opacity:.9} button:disabled{opacity:.5;cursor:wait}
  .err{color:#FF7BA6;font-size:12px;min-height:18px;margin-top:14px;letter-spacing:.03em}
  .foot{margin-top:34px;font-size:10px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase}
</style>
</head>
<body>
  <div class="gate">
    <div class="mark">Apresentação confidencial</div>
    <h1><span>Córtex</span> <span class="l2">City</span></h1>
    <p class="desc">Esta apresentação é protegida. Digite a senha para entrar na cidade.</p>
    <form id="f">
      <input id="pw" type="password" placeholder="senha" autocomplete="off" autofocus aria-label="Senha">
      <button id="go" type="submit">Entrar</button>
    </form>
    <div class="err" id="err" role="alert"></div>
    <div class="foot">Córtex City · acesso restrito</div>
  </div>

  function b64ToBytes(s){var bin=atob(s),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
  var f=document.getElementById('f'),pw=document.getElementById('pw'),err=document.getElementById('err'),go=document.getElementById('go');
  function patchHtml(html){
    var patch='\n<style id="imagePatchStyles">\n'+
      '#hero{overflow:hidden;isolation:isolate}\n'+
      '.hero-copy{position:relative;z-index:1;text-shadow:0 2px 18px rgba(5,6,14,.72)}\n'+
      '.hero-copy::before{content:"";position:absolute;inset:-34px -46px -38px -34px;z-index:-1;pointer-events:none;background:radial-gradient(70% 58% at 38% 38%,rgba(5,6,14,.78),rgba(5,6,14,.48) 48%,transparent 76%)}\n'+
      '.hero-kicker{color:#BFC8FF}\n'+
      '#hero h1 .l1{color:#F2F1FA}\n'+
      '#hero h1 .l2{-webkit-text-stroke:1.35px #68E9FF;filter:drop-shadow(0 0 12px rgba(94,230,255,.2))}\n'+
      '.hero-sub{color:#E3E6F8}\n'+
      '.hero-meta{color:#B9C1E9}\n'+
      '.hero-visual-bg{position:absolute;inset:0;z-index:0;pointer-events:none}\n'+
      '.hero-visual-bg picture,.hero-visual-bg img{display:block;width:100%;height:100%}\n'+
      '.hero-visual-bg img{object-fit:cover;object-position:64% 50%;opacity:.48;filter:saturate(1.08) contrast(1.04)}\n'+
      '.hero-visual-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(9,12,24,.96) 0%,rgba(9,12,24,.82) 30%,rgba(9,12,24,.52) 68%,rgba(9,12,24,.78) 100%),linear-gradient(180deg,rgba(9,12,24,.45) 0%,rgba(9,12,24,.06) 45%,var(--night) 100%)}\n'+
      '.map-stage{filter:drop-shadow(0 28px 58px rgba(0,0,0,.42))}\n'+
      '.cast-art{position:relative;display:block;width:100%;margin:-18px 0 34px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--night-2)}\n'+
      '.cast-art img{display:block;width:100%;aspect-ratio:16/8.2;object-fit:cover;object-position:center;filter:saturate(1.04) contrast(1.02)}\n'+
      '.cast-art::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(9,12,24,.2)),radial-gradient(90% 70% at 18% 28%,rgba(124,242,200,.16),transparent 55%);pointer-events:none}\n'+
      '.anti-control{margin-top:36px;border:1px solid var(--line);border-left:2px solid var(--impulse);border-radius:8px;padding:24px 26px;background:rgba(94,230,255,.035)}\n'+
      '.anti-control .k{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--impulse);margin-bottom:9px}\n'+
      '.anti-control p{font-size:15px;color:#C6C8E0;line-height:1.55;margin:0;max-width:76ch}\n'+
      '.anti-control strong{color:var(--myelin);font-weight:600}\n'+
      '.dive-grid{display:grid;grid-template-columns:minmax(280px,.88fr) 1.12fr;gap:46px;align-items:center}\n'+
      '.dive-art{position:relative;display:block;width:100%;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--deep);box-shadow:0 28px 70px rgba(0,0,0,.32)}\n'+
      '.dive-art img{display:block;width:100%;aspect-ratio:10/15.6;object-fit:cover;object-position:center;filter:saturate(1.05) contrast(1.03)}\n'+
      '.dive-art::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 80% at 50% 36%,transparent 48%,rgba(5,6,14,.24) 100%);pointer-events:none}\n'+
      '@media(max-width:900px){.hero-visual-bg img{object-position:70% 50%;opacity:.36}.dive-grid{grid-template-columns:1fr;gap:32px}.dive-art{max-width:520px;margin:0 auto}}\n'+
      '</style>\n';
    return html.replace('</head>',patch+'</head>');
  }
  function applyImagePatch(){
    var hero=document.getElementById('hero');
    if(hero&&!hero.querySelector('.hero-visual-bg')) hero.insertAdjacentHTML('afterbegin','<div class="hero-visual-bg" aria-hidden="true"><picture><source srcset="assets/images/cortex-city-hero.webp" type="image/webp"><img src="assets/images/cortex-city-hero.webp" alt="" loading="eager" decoding="async"></picture></div>');
    var castHead=document.querySelector('#elenco .section-head');
    if(castHead&&!document.querySelector('.cast-art')) castHead.insertAdjacentHTML('afterend','<picture class="cast-art"><source srcset="assets/images/cortex-city-character-lineup-round2.webp" type="image/webp"><img src="assets/images/cortex-city-character-lineup-round2.webp" alt="Folha exploratória de personagens de Córtex City com Léo, Astri, Spike, Comandante Amy, Prefeito Frontal e Sra. Hipo." loading="lazy" decoding="async"></picture>');
    var bet=document.querySelector('#aposta .bet');
    if(bet&&!document.querySelector('.anti-control')) bet.insertAdjacentHTML('afterend','<div class="anti-control reveal in"><div class="k">Regra anti-homúnculo</div><p><strong>Não existe sala de controle.</strong> O comportamento do Léo nasce do saldo de muitos distritos funcionando em paralelo: a Amy é só mais rápida, o Prefeito Frontal é só um departamento em obras, e "Léo" é a cidade inteira com sua história.</p></div>');
    var stack=document.querySelector('#mergulho .dive-stack');
    if(stack&&!document.querySelector('.dive-grid')){
      var grid=document.createElement('div');
      grid.className='dive-grid reveal in';
      stack.parentNode.insertBefore(grid,stack);
      grid.insertAdjacentHTML('afterbegin','<picture class="dive-art"><source srcset="assets/images/cortex-city-mergulho.webp" type="image/webp"><img src="assets/images/cortex-city-mergulho.webp" alt="Camadas de Córtex City conectadas por um impulso azul durante o Mergulho." loading="lazy" decoding="async"></picture>');
      stack.classList.remove('reveal');
      stack.classList.add('in');
      grid.appendChild(stack);
    }
  }
  f.addEventListener('submit',async function(e){
    e.preventDefault(); err.textContent=''; go.disabled=true; go.textContent='Abrindo…';
    try{
      var enc=new TextEncoder();
      var baseKey=await crypto.subtle.importKey('raw',enc.encode(pw.value),'PBKDF2',false,['deriveKey']);
      var key=await crypto.subtle.deriveKey(
        {name:'PBKDF2',salt:b64ToBytes(SALT),iterations:ITER,hash:'SHA-256'},
        baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
      var ptBuf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBytes(IV),tagLength:128},key,b64ToBytes(CT));
      var html=patchHtml(new TextDecoder().decode(ptBuf));
      document.open(); document.write(html); document.close();
      setTimeout(applyImagePatch,0);
    }catch(ex){
      go.disabled=false; go.textContent='Entrar';
      err.textContent='Senha incorreta. Tente de novo.'; pw.value=''; pw.focus();
    }
  });
